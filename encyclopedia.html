<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crop Encyclopedia 📚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url("https://images.unsplash.com/photo-1532886821327-d2643d3b0517?crop=entropy&cs=tinysrgb&fit=max&ixid=MnwzNjQzOXwwfDF8c2VhcmNofDJ8fGZlYWR8ZW58MHx8fHwxNjYzMTgxNzI3&ixlib=rb-1.2.1&q=80&w=1080") no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            padding: 100px 20px;
            text-align: center;
            max-width: 1100px;
            margin: 0 auto;
        }

        h2 {
            font-size: 36px;
            margin-bottom: 40px;
            color: #90ee90;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.6);
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .card {
            background-color: rgba(0, 128, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            width: 280px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-align: left;
            color: white;
            font-size: 18px;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 20px rgba(0, 128, 0, 0.7);
        }

        .card h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ffcc00;
            text-transform: uppercase;
        }

        .card p {
            line-height: 1.6;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .card {
                width: 90%;
                padding: 20px;
            }
            h2 {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="overlay"></div>

    <div class="container">
        <h2>Explore Our Crop Encyclopedia 🌾</h2>

        <!-- Crop cards -->
        <div class="card-container">
            {% for crop, info in crops.items() %}
                <div class="card">
                    <h3>{{ crop }}</h3>
                    <p>{{ info }}</p>
                </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
