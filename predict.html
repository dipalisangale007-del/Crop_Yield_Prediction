<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Yield Prediction</title>
    <link rel="stylesheet" href="../static/style.css"> 
</head>
<body class="background">
    <div class="container">
        <div class="form-box">
            <h2>Crop Yield Prediction</h2>

            <form action="{{ url_for('predict') }}" method="POST">
                <input type="text" id="rainfall" name="rainfall" required placeholder="Rainfall (mm)">
                <input type="text" id="temperature" name="temperature" required placeholder="Temperature (°C)">
                <input type="text" id="humidity" name="humidity" required placeholder="Humidity (%)">
                <input type="text" id="soil_ph" name="soil_ph" required placeholder="Soil pH">
                <input type="text" id="soil_moisture" name="soil_moisture" required placeholder="Soil Moisture (%)">
                <input type="text" id="fertilizer_usage" name="fertilizer_usage" required placeholder="Fertilizer Usage (kg/ha)">
                <input type="text" id="current_crop" name="current_crop" required placeholder="Current Crop">
                <input type="text" id="land_area" name="land_area" required placeholder="Land Area (acres)">
                <input type="submit" value="Predict Yield">
            </form>

            {% if error %}
                <div class="result" style="background-color: rgba(220, 53, 69, 0.7); margin-top: 20px;">
                    {{ error }}
                </div>
            {% endif %}

            {% if custom_message %}
                <div class="result" style="margin-top: 20px;">
                    <p>{{ custom_message }}</p>
                </div>
            {% endif %}

            {% if suggested_crop %}
                <div class="result" style="margin-top: 20px;">
                    <h3>Suggested Crop: {{ suggested_crop }}</h3>
                </div>
            {% endif %}

            <div class="btn-group" style="margin-top: 30px;">
                <a href="{{ url_for('history') }}" class="button">View Prediction History</a>
                <a href="{{ url_for('dashboard') }}" class="button">Back to Dashboard</a>
                <a href="{{ url_for('home') }}" class="button">Home</a>
            </div>
        </div>

        <footer style="margin-top: 40px; text-align: center; color: #ccc;">
            <p>© 2025 Crop Yield Prediction System</p>
        </footer>
    </div>
</body>
</html>
